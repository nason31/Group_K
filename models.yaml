image_model:
  name: "llava:7b"
  prompt: "You are an environmental analyst. Describe in detail what you see in this satellite image. Focus on land use, vegetation, water bodies, urban presence, and any visible signs of degradation or deforestation."
  max_tokens: 512
  temperature: 0.2

text_model:
  name: "qwen3.5:4b"
  prompt: "You are an environmental risk assessor. Given the following description of a satellite image, generate exactly three yes/no questions that determine environmental risk, then answer each one. Keep your explanation concise. End your response with exactly one final line in this exact format: FINAL_VERDICT: DANGER or FINAL_VERDICT: SAFE. Do not output any other verdict line formats."
  max_tokens: 512
  temperature: 0.1

image_settings:
  tile_size: 256
  output_format: "png"
  esri_url_template: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
